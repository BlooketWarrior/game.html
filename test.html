<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS RIFT | The Text Adventure</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0c;
            --text-gray: #d1d1d1;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-gray);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 80%;
            max-width: 800px;
            background: rgba(20, 20, 25, 0.9);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        #stats-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--neon-purple);
            padding-bottom: 10px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 10px;
            white-space: pre-wrap;
        }

        .input-area {
            display: flex;
            border-top: 1px solid var(--neon-purple);
            padding-top: 15px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--neon-blue);
            font-family: inherit;
            font-size: 1.1rem;
            flex-grow: 1;
            outline: none;
        }

        .btn {
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            margin-left: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover { background: #9d10d6; }

        .system-msg { color: var(--neon-purple); }
        .reward-msg { color: #39ff14; }
        .damage-msg { color: #ff3131; }

        /* Scrollbar Styling */
        #terminal::-webkit-scrollbar { width: 5px; }
        #terminal::-webkit-scrollbar-thumb { background: var(--neon-blue); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats-bar">
        <span id="stat-era">Era: Loading...</span>
        <span id="stat-hp">HP: 100</span>
        <span id="stat-shards">Shards: 0</span>
    </div>

    <div id="terminal"></div>

    <div class="input-area">
        <span>> </span>
        <input type="text" id="user-input" autofocus placeholder="Type command/answer...">
        <button class="btn" onclick="handleInput()">Enter</button>
    </div>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const inputField = document.getElementById('user-input');
    
    let gameState = {
        hp: 100,
        shards: 0,
        gears: 0,
        level: 0,
        mode: 'start', // start, play, market, end
        damageReduction: 1.0,
        multiplier: 1,
        neuralLink: false
    };

    const levels = [
        { era: "Neo-Tokyo 3025", q: "I have cities but no houses, mountains but no trees. What am I?", a: "map", hint: "It's a paper guide." },
        { era: "The Jurassic", q: "The more of me there is, the less you see. What am I?", a: "darkness", hint: "Opposite of light." },
        { era: "The Void", q: "I follow you all day, but leave when the sun sets. What am I?", a: "shadow", hint: "The sun creates it behind you." }
    ];

    function log(text, className = "") {
        const p = document.createElement('p');
        p.className = className;
        p.innerText = text;
        terminal.appendChild(p);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function updateStats() {
        document.getElementById('stat-era').innerText = `Era: ${levels[gameState.level]?.era || "The End"}`;
        document.getElementById('stat-hp').innerText = `HP: ${gameState.hp}`;
        document.getElementById('stat-shards').innerText = `Shards: ${gameState.shards}`;
    }

    function handleInput() {
        const val = inputField.value.toLowerCase().trim();
        if (!val) return;
        inputField.value = '';

        if (gameState.mode === 'start') {
            if (val.includes('scholar')) {
                gameState.shards = 100;
                log("Scholar selected: Starting with 100 Shards.");
            } else {
                gameState.hp = 150;
                log("Tank selected: Starting with 150 HP.");
            }
            gameState.mode = 'play';
            startLevel();
        } else if (gameState.mode === 'play') {
            checkAnswer(val);
        } else if (gameState.mode === 'market') {
            handleMarket(val);
        }
        updateStats();
    }

    function startLevel() {
        if (gameState.level >= levels.length) {
            log("CONGRATULATIONS! You restored the timeline.", "reward-msg");
            gameState.mode = 'end';
            return;
        }
        log(`\n--- ARRIVING AT: ${levels[gameState.level].era} ---`, "system-msg");
        log(levels[gameState.level].q);
        if (gameState.neuralLink) log(`[NEURAL LINK HINT]: ${levels[gameState.level].hint}`);
    }

    function checkAnswer(val) {
        const correct = levels[gameState.level].a;
        if (val.includes(correct)) {
            let gain = 50 * gameState.multiplier;
            gameState.shards += gain;
            gameState.gears++;
            log(`CORRECT. Gear recovered! +${gain} Shards.`, "reward-msg");
            gameState.level++;
            enterMarket();
        } else {
            let dmg = Math.floor(25 * gameState.damageReduction);
            gameState.hp -= dmg;
            log(`WRONG. Reality ripples. You take ${dmg} damage.`, "damage-msg");
            if (gameState.hp <= 0) {
                log("FATAL ERROR: You have been deleted from history.", "damage-msg");
                gameState.mode = 'end';
            }
        }
    }

    function enterMarket() {
        gameState.mode = 'market';
        log("\n--- VOID BAZAAR OPEN ---", "system-msg");
        log("1: Neural Link (50s) | 2: Plating (75s) | 3: Magnet (100s) | 4: Heal (30s) | 5: EXIT");
    }

    function handleMarket(val) {
        if (val === '1' && gameState.shards >= 50) {
            gameState.neuralLink = true; gameState.shards -= 50; log("Neural Link installed.");
        } else if (val === '2' && gameState.shards >= 75) {
            gameState.damageReduction = 0.5; gameState.shards -= 75; log("Plating equipped.");
        } else if (val === '3' && gameState.shards >= 100) {
            gameState.multiplier = 2; gameState.shards -= 100; log("Magnet active.");
        } else if (val === '4' && gameState.shards >= 30) {
            gameState.hp += 40; gameState.shards -= 30; log("Healed 40 HP.");
        } else if (val === '5' || val.includes('exit')) {
            gameState.mode = 'play';
            startLevel();
            return;
        } else {
            log("Invalid choice or not enough shards.");
        }
        log("Anything else? (Type 1-5)");
    }

    // Initialize
    log("CHRONOS RIFT v1.0", "system-msg");
    log("Choose your Perk: [Scholar] or [Tank]?");
    updateStats();

    // Allow "Enter" key
    inputField.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleInput();
    });
</script>

</body>
</html>
